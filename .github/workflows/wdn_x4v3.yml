name: Convert WDN → ncnn

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install numpy==1.26.4
          pip install torch==2.1.0+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install onnx==1.15.0 onnxsim==0.4.35

      - name: Download model
        run: |
          mkdir -p models
          wget -q "https://github.com/xinntao/Real-ESRGAN/releases/download/v0.2.5.0/realesr-general-wdn-x4v3.pth" \
            -O models/realesr-general-wdn-x4v3.pth

      - name: PyTorch → ONNX
        working-directory: models
        run: python ${{ github.workspace }}/scripts/export_to_onnx.py --input realesr-general-wdn-x4v3.pth --output realesr-general-wdn-x4v3.onnx

      - name: Build ncnn tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake libprotobuf-dev protobuf-compiler
          git clone --depth 1 https://github.com/Tencent/ncnn.git ncnn-src
          cd ncnn-src && git submodule update --init
          mkdir build && cd build
          cmake -DNCNN_VULKAN=OFF -DNCNN_BUILD_EXAMPLES=OFF -DNCNN_BUILD_TOOLS=ON -DNCNN_BUILD_BENCHMARK=OFF ..
          cmake --build . -j$(nproc)
          cp tools/onnx2ncnn/onnx2ncnn ${{ github.workspace }}/
          cp tools/ncnnoptimize/ncnnoptimize ${{ github.workspace }}/

      - name: ONNX → ncnn
        working-directory: models
        run: |
          ${{ github.workspace }}/onnx2ncnn realesr-general-wdn-x4v3.onnx realesr-general-wdn-x4v3.param realesr-general-wdn-x4v3.bin
          ${{ github.workspace }}/ncnnoptimize realesr-general-wdn-x4v3.param realesr-general-wdn-x4v3.bin realesr-general-wdn-x4v3.param realesr-general-wdn-x4v3.bin 65536
          head -5 realesr-general-wdn-x4v3.param
          ls -lh *.param *.bin

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: wdn-x4v3-ncnn
          path: |
            models/realesr-general-wdn-x4v3.param
            models/realesr-general-wdn-x4v3.bin
          retention-days: 30

