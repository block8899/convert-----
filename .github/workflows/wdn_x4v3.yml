name: Convert WDN-x4v3 to NCNN

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir torch==2.1.0+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir pnnx numpy==1.26.4

      - name: Download model
        run: |
          wget -q "https://github.com/xinntao/Real-ESRGAN/releases/download/v0.2.5.0/realesr-general-wdn-x4v3.pth" \
            -O wdn-x4v3.pth
          ls -lh wdn-x4v3.pth

      - name: Convert
        run: |
          cat > convert.py << 'PYEOF'
          import torch, torch.nn as nn, pnnx, os, gc

          class SRVGGNetCompact(nn.Module):
              def __init__(self, num_in_ch=3, num_out_ch=3, num_feat=64,
                           num_conv=16, upscale=4, act_type='prelu'):
                  super().__init__()
                  self.body = nn.ModuleList()
                  self.body.append(nn.Conv2d(num_in_ch, num_feat, 3, 1, 1))
                  self.body.append(nn.PReLU(num_parameters=num_feat))
                  for _ in range(num_conv):
                      self.body.append(nn.Conv2d(num_feat, num_feat, 3, 1, 1))
                      self.body.append(nn.PReLU(num_parameters=num_feat))
                  self.body.append(nn.Conv2d(num_feat, num_out_ch * upscale * upscale, 3, 1, 1))
                  self.upsampler = nn.PixelShuffle(upscale)

              def forward(self, x):
                  out = self.body[0](x)
                  for i in range(1, len(self.body)):
                      out = self.body[i](out)
                  return self.upsampler(out)

          print("1. Loading...")
          ckpt = torch.load("wdn-x4v3.pth", map_location="cpu", weights_only=False)
          sd = ckpt.get("params_ema", ckpt.get("params", ckpt))
          first = list(sd.keys())[0]
          for pfx in ["module.", "net_g."]:
              if first.startswith(pfx):
                  sd = {k.replace(pfx, "", 1): v for k, v in sd.items()}
                  break

          body0 = [k for k in sd if k.endswith("body.0.weight")][0]
          num_in = sd[body0].shape[1]
          num_feat = sd[body0].shape[0]
          conv_ids = []
          for k in sd:
              parts = k.split(".")
              if "body" in parts:
                  i = parts.index("body")
                  if i+1 < len(parts) and parts[i+1].isdigit() and parts[-1] == "weight" and sd[k].dim() == 4:
                      conv_ids.append(int(parts[i+1]))
          max_idx = max(conv_ids)
          last_k = [k for k in sd if f"body.{max_idx}.weight" in k][0]
          num_out = sd[last_k].shape[0] // 16
          num_conv = (max_idx - 2) // 2
          srvgg_sd = {k: v for k, v in sd.items() if not k.startswith(("denoise.","denoising.","haar_"))}
          print(f"   SRVGG: in={num_in} out={num_out} feat={num_feat} conv={num_conv}")

          model = SRVGGNetCompact(num_in, num_out, num_feat, num_conv, 4, "prelu")
          model.load_state_dict(srvgg_sd, strict=True)
          model.eval()
          torch.set_grad_enabled(False)

          print("2. PNNX export...")
          dummy = torch.randn(1, 3, 64, 64)
          with torch.no_grad():
              out = model(dummy)
          print(f"   {list(dummy.shape)} -> {list(out.shape)}")
          pnnx.export(model, "wdn-x4v3", inputs=dummy)
          del model, dummy
          gc.collect()

          for f in ["wdn-x4v3.ncnn.param", "wdn-x4v3.ncnn.bin"]:
              if os.path.exists(f):
                  print(f"   {f}: {os.path.getsize(f)/1024/1024:.1f} MB")
              else:
                  print(f"   MISSING: {f}")
                  exit(1)
          print("✓ Done")
          PYEOF

          python convert.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: wdn-x4v3-ncnn
          path: |
            wdn-x4v3.ncnn.param
            wdn-x4v3.ncnn.bin
          retention-days: 30
