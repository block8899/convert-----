name: Convert WDN → ncnn (PNNX)

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install torch==2.1.0+cpu \
                      --index-url https://download.pytorch.org/whl/cpu
          pip install torchvision==0.16.0+cpu \
                      --index-url https://download.pytorch.org/whl/cpu

      - name: Download model
        run: |
          mkdir -p models
          wget -q \
            "https://github.com/xinntao/Real-ESRGAN/releases/download/v0.2.5.0/realesr-general-wdn-x4v3.pth" \
            -O models/realesr-general-wdn-x4v3.pth
          ls -lh models/

      - name: Download PNNX
        run: |
          # PNNX pre-built binary — không cần build ncnn
          wget -q \
            "https://github.com/pnnx/pnnx/releases/download/20240410/pnnx-20240410-ubuntu.zip" \
            -O pnnx.zip
          unzip -q pnnx.zip -d pnnx-tool
          chmod +x pnnx-tool/pnnx/pnnx
          ls -la pnnx-tool/pnnx/

      - name: Generate torchscript and run PNNX
        working-directory: models
        run: |
          python $GITHUB_WORKSPACE/scripts/export_wdn_pnnx.py \
            --input realesr-general-wdn-x4v3.pth \
            --output-dir $GITHUB_WORKSPACE/models

      - name: Run PNNX converter
        working-directory: models
        run: |
          $GITHUB_WORKSPACE/pnnx-tool/pnnx/pnnx \
            wdn_script.pt \
            inputshape="[1,3,64,64]"

          echo "=== Output files ==="
          ls -lh *.param *.bin 2>/dev/null || echo "No ncnn files found"
          ls -lh wdn_script* 2>/dev/null

      - name: Rename output
        working-directory: models
        run: |
          # PNNX output: wdn_script.ncnn.param / .bin
          if [ -f "wdn_script.ncnn.param" ]; then
            cp wdn_script.ncnn.param realesr-general-wdn-x4v3.param
            cp wdn_script.ncnn.bin realesr-general-wdn-x4v3.bin
            echo "=== Verify ==="
            head -5 realesr-general-wdn-x4v3.param
            echo "---"
            wc -l realesr-general-wdn-x4v3.param
          else
            echo "ERROR: ncnn output not found"
            ls -la
            exit 1
          fi

      - name: Upload ncnn model
        uses: actions/upload-artifact@v4
        with:
          name: wdn-x4v3-ncnn
          path: |
            models/realesr-general-wdn-x4v3.param
            models/realesr-general-wdn-x4v3.bin
          retention-days: 30
