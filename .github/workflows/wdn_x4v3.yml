name: Convert WDN → ncnn

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install numpy==1.26.4
          pip install torch==2.1.0+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install onnx==1.15.0 onnxsim==0.4.35

      - name: Download model
        run: |
          mkdir -p models
          wget -q "https://github.com/xinntao/Real-ESRGAN/releases/download/v0.2.5.0/realesr-general-wdn-x4v3.pth" \
            -O models/realesr-general-wdn-x4v3.pth

      - name: PyTorch → ONNX
        working-directory: models
        run: |
          python ${{ github.workspace }}/scripts/export_to_onnx.py \
            --input realesr-general-wdn-x4v3.pth \
            --output realesr-general-wdn-x4v3.onnx

      - name: Download PNNX
        run: |
          wget -q "https://github.com/pnnx/pnnx/releases/download/20240826/pnnx-20240826-ubuntu.zip" -O pnnx.zip
          unzip -q pnnx.zip
          chmod +x pnnx
          ./pnnx --version || echo "pnnx ok"

      - name: ONNX → ncnn via PNNX
        working-directory: models
        run: |
          ${{ github.workspace }}/pnnx \
            realesr-general-wdn-x4v3.onnx \
            inputshape="[1,3,64,64]"

          # PNNX output: *.ncnn.param + *.ncnn.bin
          ls -lh *.ncnn.* 2>/dev/null || ls -lh *

          # Rename
          cp realesr-general-wdn-x4v3.ncnn.param realesr-general-wdn-x4v3.param 2>/dev/null || \
          cp realesr-general-wdn-x4v3.onnx.ncnn.param realesr-general-wdn-x4v3.param 2>/dev/null

          cp realesr-general-wdn-x4v3.ncnn.bin realesr-general-wdn-x4v3.bin 2>/dev/null || \
          cp realesr-general-wdn-x4v3.onnx.ncnn.bin realesr-general-wdn-x4v3.bin 2>/dev/null

          echo "=== Result ==="
          head -5 realesr-general-wdn-x4v3.param
          ls -lh realesr-general-wdn-x4v3.param realesr-general-wdn-x4v3.bin

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: wdn-x4v3-ncnn
          path: |
            models/realesr-general-wdn-x4v3.param
            models/realesr-general-wdn-x4v3.bin
          retention-days: 30
