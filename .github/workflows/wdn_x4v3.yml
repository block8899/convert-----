name: Convert WDN to NCNN

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install torch==2.1.0+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install pnnx numpy==1.26.4

      - name: Download model
        run: wget -q "https://github.com/xinntao/Real-ESRGAN/releases/download/v0.2.5.0/realesr-general-wdn-x4v3.pth" -O wdn_x4v3.pth

      - name: Copy script and run
        run: |
          cp scripts/convert_ncnn.py convert_ncnn.py
          python convert_ncnn.py

      - name: List output
        run: ls -lh *.param *.bin 2>/dev/null || echo "No ncnn files"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: wdn-x4v3-ncnn
          path: |
            wdn_x4v3.ncnn.param
            wdn_x4v3.ncnn.bin
          retention-days: 30
