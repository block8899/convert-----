name: Convert WDN → ncnn

on:
  workflow_dispatch:    # Chạy tay từ GitHub UI

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout repo (nơi chứa script convert) ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── Setup Python + cài dependencies ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install torch==2.1.0+cpu \
                      --index-url https://download.pytorch.org/whl/cpu
          pip install onnx==1.15.0 onnxsim==0.4.35 onnxruntime==1.16.3
          pip install opencv-python-headless numpy

      # ── Download model ──
      - name: Download model
        run: |
          mkdir -p models
          wget -q \
            "https://github.com/xinntao/Real-ESRGAN/releases/download/v0.2.5.0/realesr-general-wdn-x4v3.pth" \
            -O models/realesr-general-wdn-x4v3.pth
          ls -lh models/

      # ── Install ncnn tools ──
      - name: Install ncnn tools
        run: |
          # Build ncnn from source (chỉ cần onnx2ncnn + ncnnoptimize)
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake libprotobuf-dev protobuf-compiler libvulkan-dev glslang-tools

          git clone --depth 1 https://github.com/Tencent/ncnn.git ncnn-src
          cd ncnn-src
          mkdir -p build && cd build
          cmake -DNCNN_VULKAN=OFF -DNCNN_BUILD_EXAMPLES=OFF -DNCNN_BUILD_TOOLS=ON ..
          make -j$(nproc) onnx2ncnn ncnnoptimize

          # Copy tools ra nơi dễ dùng
          cp tools/onnx2ncnn/onnx2ncnn $GITHUB_WORKSPACE/
          cp tools/ncnnoptimize/ncnnoptimize $GITHUB_WORKSPACE/
          chmod +x $GITHUB_WORKSPACE/onnx2ncnn $GITHUB_WORKSPACE/ncnnoptimize

          echo "ncnn tools built OK"

      # ── Step 1: PyTorch → ONNX ──
      - name: Convert PyTorch → ONNX
        working-directory: models    # ← THƯ MỤC CHẠY SCRIPT
        run: |
          python $GITHUB_WORKSPACE/scripts/convert_wdn_to_onnx.py \
            --input realesr-general-wdn-x4v3.pth \
            --output realesr-general-wdn-x4v3.onnx \
            --input-size 64
          ls -lh *.onnx

      # ── Step 2: ONNX → ncnn ──
      - name: Convert ONNX → ncnn
        working-directory: models
        run: |
          $GITHUB_WORKSPACE/onnx2ncnn \
            realesr-general-wdn-x4v3.onnx \
            realesr-general-wdn-x4v3.param \
            realesr-general-wdn-x4v3.bin

          echo "=== Optimize ==="
          $GITHUB_WORKSPACE/ncnnoptimize \
            realesr-general-wdn-x4v3.param \
            realesr-general-wdn-x4v3.bin \
            realesr-general-wdn-x4v3-opt.param \
            realesr-general-wdn-x4v3-opt.bin \
            65536

          echo "=== Output ==="
          ls -lh *.param *.bin

      # ── Verify ncnn model ──
      - name: Verify ncnn model
        working-directory: models
        run: |
          head -5 realesr-general-wdn-x4v3-opt.param
          echo "---"
          grep -c "Convolution" realesr-general-wdn-x4v3-opt.param
          echo "convolution layers found"

      # ── Upload artifacts ──
      - name: Upload ncnn model
        uses: actions/upload-artifact@v4
        with:
          name: wdn-x4v3-ncnn
          path: |
            models/realesr-general-wdn-x4v3-opt.param
            models/realesr-general-wdn-x4v3-opt.bin
          retention-days: 30
