name: Convert WDN → ncnn

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install numpy==1.26.4
          pip install torch==2.1.0+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install ncnn onnx

      - name: Download model
        run: |
          mkdir -p models
          wget -q "https://github.com/xinntao/Real-ESRGAN/releases/download/v0.2.5.0/realesr-general-wdn-x4v3.pth" \
            -O models/realesr-general-wdn-x4v3.pth

      - name: Convert PyTorch → ncnn (all-in-one)
        working-directory: models
        run: python ${{ github.workspace }}/scripts/convert.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: wdn-x4v3-ncnn
          path: |
            models/wdn-x4v3.param
            models/wdn-x4v3.bin
          retention-days: 30
